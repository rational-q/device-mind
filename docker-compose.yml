version: '3.8'

# ============================================================
# DeviceMind — 生产环境部署
# 使用: docker-compose up -d
# 查看日志: docker-compose logs -f
# ============================================================

networks:
  devicemind-net:
    driver: bridge

volumes:
  mysql_data:
  timescale_data:
  redis_data:
  kafka_data:

services:
  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0
    container_name: devicemind-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init-mysql.sql:/docker-entrypoint-initdb.d/init-mysql.sql
    networks:
      - devicemind-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== TimescaleDB ====================
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: devicemind-timescaledb
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./db/init-timescaledb.sql:/docker-entrypoint-initdb.d/init-timescaledb.sql
    networks:
      - devicemind-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: devicemind-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - devicemind-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== ZooKeeper (Kafka 依赖) ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: devicemind-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    ports:
      - "2181:2181"
    networks:
      - devicemind-net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== Kafka ====================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: devicemind-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 72
      KAFKA_LOG_RETENTION_BYTES: 10737418240
      KAFKA_LOG_SEGMENT_BYTES: 536870912
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - devicemind-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ==================== DeviceMind Broker (MQTT 接入) ====================
  broker:
    image: ${BROKER_IMAGE}
    container_name: devicemind-broker
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_DEVICE_DATA: device-data
      KAFKA_TOPIC_DEVICE_LIFECYCLE: ${KAFKA_TOPIC_DEVICE_LIFECYCLE:-device-lifecycle}
      KAFKA_TOPIC_DEVICE_STATUS: ${KAFKA_TOPIC_DEVICE_STATUS:-device-status}
      KAFKA_TOPIC_DEVICE_COMMAND: ${KAFKA_TOPIC_DEVICE_COMMAND:-device-command}
      KAFKA_TOPIC_DEVICE_RESPONSE: ${KAFKA_TOPIC_DEVICE_RESPONSE:-device-response}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CORE_SERVICE_URL: http://core:8080
      BROKER_AUTH_ENABLED: ${BROKER_AUTH_ENABLED:-false}
      BROKER_AUTH_USERNAME: ${BROKER_AUTH_USERNAME:-}
      BROKER_AUTH_PASSWORD: ${BROKER_AUTH_PASSWORD:-}
    ports:
      - "1883:1883"
      - "1884:1884"
    networks:
      - devicemind-net
    restart: unless-stopped

  # ==================== DeviceMind Core (设备核心服务) ====================
  core:
    image: ${CORE_IMAGE}
    container_name: devicemind-core
    depends_on:
      mysql:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_URL: jdbc:mysql://mysql:3306/devicemind?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      MYSQL_USERNAME: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TSDB_URL: jdbc:postgresql://timescaledb:5432/devicemind_ts
      TSDB_USERNAME: ${TSDB_USERNAME}
      TSDB_PASSWORD: ${TSDB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_DEVICE_DATA: device-data
      KAFKA_TOPIC_DEVICE_LIFECYCLE: ${KAFKA_TOPIC_DEVICE_LIFECYCLE:-device-lifecycle}
      KAFKA_TOPIC_DEVICE_STATUS: ${KAFKA_TOPIC_DEVICE_STATUS:-device-status}
      KAFKA_TOPIC_DEVICE_COMMAND: ${KAFKA_TOPIC_DEVICE_COMMAND:-device-command}
      KAFKA_TOPIC_DEVICE_RESPONSE: ${KAFKA_TOPIC_DEVICE_RESPONSE:-device-response}
      AGENT_SERVICE_URL: http://agent:8081
    ports:
      - "8080:8080"
    networks:
      - devicemind-net
    restart: unless-stopped

  # ==================== DeviceMind Agent (AI Agent) ====================
  agent:
    image: ${AGENT_IMAGE}
    container_name: devicemind-agent
    depends_on:
      core:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DEEPSEEK_API_URL: ${DEEPSEEK_API_URL}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      CORE_SERVICE_URL: http://core:8080
      TSDB_URL: jdbc:postgresql://timescaledb:5432/devicemind_ts
      TSDB_USERNAME: ${TSDB_USERNAME}
      TSDB_PASSWORD: ${TSDB_PASSWORD}
    ports:
      - "8081:8081"
    networks:
      - devicemind-net
    restart: unless-stopped

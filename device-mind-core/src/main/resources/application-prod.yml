spring:
  datasource:
    mysql:
      url: ${MYSQL_URL}
      username: ${MYSQL_USERNAME}
      password: ${MYSQL_PASSWORD}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        pool-name: mysql-pool
        maximum-pool-size: 50
        minimum-idle: 10
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
    timescaledb:
      url: ${TSDB_URL}
      username: ${TSDB_USERNAME}
      password: ${TSDB_PASSWORD}
      driver-class-name: org.postgresql.Driver
      hikari:
        pool-name: timescale-pool
        maximum-pool-size: 50
        minimum-idle: 10
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 3000
      lettuce:
        pool:
          max-active: 50
          max-idle: 10
          min-idle: 5
          max-wait: 3000
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      auto-offset-reset: latest

kafka:
  topics:
    device-data: ${KAFKA_TOPIC_DEVICE_DATA}

agent-service:
  url: ${AGENT_SERVICE_URL}

logging:
  level:
    com.devicemind.core: INFO
    com.devicemind.core.persistence.mapper: WARN

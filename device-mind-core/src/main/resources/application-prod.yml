spring:
  datasource:
    mysql:
      url: ${MYSQL_URL}
      username: ${MYSQL_USERNAME}
      password: ${MYSQL_PASSWORD}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        pool-name: mysql-pool
        maximum-pool-size: 50
        minimum-idle: 10
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
    timescaledb:
      url: ${TSDB_URL}
      username: ${TSDB_USERNAME}
      password: ${TSDB_PASSWORD}
      driver-class-name: org.postgresql.Driver
      hikari:
        pool-name: timescale-pool
        maximum-pool-size: 50
        minimum-idle: 10
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 3000
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      auto-offset-reset: latest

redisson:
  connection-pool-size: 64
  connection-minimum-idle-size: 16
  retry-attempts: 5
  retry-interval: 1500
  dns-monitoring-interval: 5000

kafka:
  topic:
    replicas: 3
    min-isr: 2
  topics:
    device-data: ${KAFKA_TOPIC_DEVICE_DATA}
    device-lifecycle: ${KAFKA_TOPIC_DEVICE_LIFECYCLE}
    device-status: ${KAFKA_TOPIC_DEVICE_STATUS}
    device-command: ${KAFKA_TOPIC_DEVICE_COMMAND}
    device-response: ${KAFKA_TOPIC_DEVICE_RESPONSE}
agent-service:
  url: ${AGENT_SERVICE_URL}


device:
  offline:
    alert-phone: ${DEVICE_OFFLINE_ALERT_PHONE:}
  heartbeat:
    timeout-minutes: ${DEVICE_HEARTBEAT_TIMEOUT:30}

alert:
  critical:
    alert-phone: ${ALERT_CRITICAL_PHONE:}

logging:
  level:
    com.devicemind.core: INFO
    com.devicemind.core.persistence.mapper: WARN

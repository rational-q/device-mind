spring:
  datasource:
    mysql:
      url: jdbc:mysql://localhost:3306/devicemind?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      username: root
      password:
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        pool-name: mysql-pool
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
    timescaledb:
      url: jdbc:postgresql://localhost:5432/devicemind_ts
      username: root
      password:
      driver-class-name: org.postgresql.Driver
      hikari:
        pool-name: timescale-pool
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: latest
    producer:
      properties:
        min.insync.replicas: 1   # 本地单节点 Kafka

redisson:
  connection-pool-size: 16
  connection-minimum-idle-size: 4
  retry-attempts: 3
  retry-interval: 1000

kafka:
  topic:
    partitions: 3
    replicas: 1       # 本地单节点 Kafka
    min-isr: 1
  topics:
    device-data: device-data
    device-lifecycle: device-lifecycle
    device-status: device-status
    device-command: device-command
    device-response: device-response
agent-service:
  url: http://localhost:8081


device:
  offline:
    alert-phone: ${DEVICE_OFFLINE_ALERT_PHONE:}
  heartbeat:
    timeout-minutes: ${DEVICE_HEARTBEAT_TIMEOUT:30}

alert:
  critical:
    alert-phone: ${ALERT_CRITICAL_PHONE:}

logging:
  level:
    com.devicemind.core: DEBUG
    com.devicemind.core.persistence.mapper: DEBUG

spring:
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000
  datasource:
    url: jdbc:postgresql://localhost:5432/devicemind_ts
    username: mac
    password:
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: agent-tsdb-pool
      maximum-pool-size: 3
      minimum-idle: 0
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 600000

deepseek:
  api:
    url: ${DEEPSEEK_API_URL:https://api.deepseek.com}
    key: ${DEEPSEEK_API_KEY:}
    timeout: 30

core-service:
  url: http://localhost:8080

logging:
  level:
    com.devicemind.agent: DEBUG

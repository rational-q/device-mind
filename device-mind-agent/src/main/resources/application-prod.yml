spring:
  datasource:
    url: ${TSDB_URL}
    username: ${TSDB_USERNAME}
    password: ${TSDB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: agent-tsdb-pool
      maximum-pool-size: 3
      minimum-idle: 0
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 600000

deepseek:
  api:
    url: ${DEEPSEEK_API_URL}
    key: ${DEEPSEEK_API_KEY}
    timeout: 30

core-service:
  url: ${CORE_SERVICE_URL}

logging:
  level:
    com.devicemind.agent: INFO
